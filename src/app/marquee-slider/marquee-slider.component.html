<div class="relative overflow-hidden w-full bg-white py-8">
    <!-- Edge fade effect -->
    <div class="absolute left-0 top-0 bottom-0 w-2/5 bg-gradient-to-r from-white to-transparent z-10"></div>
    <div class="absolute right-0 top-0 bottom-0 w-2/5 bg-gradient-to-l from-white to-transparent z-10"></div>
  
    <!-- Scrolling content -->
    <div class="animate-marquee whitespace-nowrap flex gap-10">
      <div *ngFor="let item of items" class="flex items-center gap-2 text-gray-700 font-bold text-2xl">
        <span class="text-orange-400">✓</span>
        {{ item }}
      </div>
  
      <!-- Repeat for infinite loop effect -->
      <div *ngFor="let item of items" class="flex items-center gap-2 text-gray-700 font-bold text-2xl">
        <span class="text-orange-400">✓</span>
        {{ item }}
      </div>
    </div>
  </div>
