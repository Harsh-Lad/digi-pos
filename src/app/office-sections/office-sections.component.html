<div class="py-10 my-10">
    <!-- Tabs - keeping these unchanged as requested -->
    <div class="flex justify-center space-x-10  py-4 bg-gray-100">
      <button
        *ngFor="let tab of tabs"
        (click)="switchTab(tab)"
        class="font-semibold text-lg"
        [ngClass]="{
          'text-orange-600 border-b-2 border-orange-600': activeTab === tab,
          'text-gray-800 hover:text-orange-600': activeTab !== tab
        }"
      >
        {{ tab }}
      </button>
    </div>
  
    <div class="flex flex-col lg:flex-row gap-10 mt-32 items-start px-48">
      <!-- Left: Products List - improved styling -->
      <div class="w-full lg:w-1/3  p-4 rounded-lg ">
        <h2 class="text-4xl font-bold text-blue-900 mb-4">{{ activeTab }}</h2>
        <ul class="space-y-2">
          <li
            *ngFor="let product of activeProducts; let i = index"
            (click)="selectProduct(i)"
            class="cursor-pointer text-2xl p-2 rounded transition-colors duration-200"
            [ngClass]="{
              ' text-orange-600 font-semibold': activeProductIndex === i,
              'hover:bg-gray-100 text-gray-700': activeProductIndex !== i
            }"
          >
            • {{ product.name }}
          </li>
        </ul>
      </div>
  
      <!-- Right: Product Details - rearranged layout -->
      <div class="w-full lg:w-2/3 flex flex-col md:flex-row gap-6">
        <!-- Center: Image -->
        <div class="w-full md:w-1/2 lg:w-1/2 flex justify-center">
          <div class="relative w-full max-w-lg">
            <img
              [src]="currentProduct.image"
              [alt]="currentProduct.name"
              class="w-full h-[40svh] rounded-lg object-contain"
            />
            <div class="bg-[#002999] h-[55svh] w-[15svw] absolute left-1/2 -translate-1/2 z-[-1] rounded-full top-1/2"></div>
            <div class="absolute -bottom-10 left-1/2 -translate-x-1/2 flex space-x-4">
              <button (click)="prev()" class="p-2 w-10 h-10 flex items-center justify-center pb-3 bg-orange-600 text-3xl text-white rounded-full">‹</button>
              <button (click)="next()" class="p-2 w-10 h-10 flex items-center justify-center pb-3 bg-orange-600 text-3xl text-white rounded-full">›</button>
            </div>
          </div>
        </div>
        
        <!-- Right: Content -->
        <div class="w-full md:w-1/2 lg:w-1/2 flex flex-col text-left">
          <h3 class="text-xl font-bold text-orange-600 mb-2">{{ currentProduct.name }}</h3>
          <p class="text-gray-600 mb-3">{{ currentProduct.description }}</p>
          <a href="#" class="text-orange-600 font-semibold underline">Learn More</a>
        </div>
      </div>
    </div>
  </div>
