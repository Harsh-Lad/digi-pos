<header [ngClass]="scrolled ? 'bg-white shadow-sm' : 'bg-transparent'"
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-500 py-4 px-6 w-screen ">
  <div class="w-full px-4 flex items-center justify-between  ">
    <!-- Left Section: Logo and Nav Items -->
    <div class="flex items-center gap-4">
      <!-- Logo -->
      <a routerLink="/" class="relative z-10 mr-4">
        <img src="logo.png" alt="DigiPOS Logo" class="h-10 w-auto" />
      </a>

      <!-- Desktop Navigation Items -->
      <nav class="hidden lg:flex items-center space-x-1">
        <ng-container *ngFor="let item of navItems">
          <div class="relative group" (mouseenter)="activeDropdown = item.hasDropdown ? item.name : null">
            <button *ngIf="item.hasDropdown"
              class="text-sm font-medium h-10 flex items-center gap-1 px-3 py-2 hover:text-amber-600 rounded-md">
              {{ item.name }}
              <span class="material-icons text-sm">expand_more</span>
            </button>
            <a *ngIf="!item.hasDropdown" [routerLink]="item.href"
              class="text-sm font-medium h-10 px-3 py-2 hover:text-amber-600 hover:transition-colors rounded-md inline-flex items-center">
              {{ item.name }}
            </a>

            <!-- Dropdown Content (only for items with dropdowns) -->
            <div *ngIf="activeDropdown === item.name" class="fixed left-0 right-0 bg-white p-6 shadow-xl z-40 w-full"
              [style.top]="scrolled ? '72px' : '72px'" (mouseenter)="activeDropdown = item.name"
              (mouseleave)="activeDropdown = null">
              <div class="container mx-auto">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                  <ng-container *ngFor="let section of getDropdownContent(item.name); let i = index; let last = last">
                    <div [ngClass]="{
                        'border-r border-gray-200 pr-4': getDropdownContent(item.name).length > 1 && !last
                      }">
                      <h3 class="text-xs font-semibold text-gray-500 tracking-wider mb-3">{{ section.title }}</h3>
                      <div class="space-y-4 ">
                        <a *ngFor="let entry of section.items" [routerLink]="entry.href"
                          class="flex items-start space-x-3 group hover:bg-gray-100 p-2 rounded-md transition-all duration-200" (click)="activeDropdown = null">
                          <div class="mt-1 text-primary w-6 h-6 flex items-center justify-center">
                            <span class="material-icons text-amber-600 text-base">{{ entry.icon }}</span>

                          </div>
                          <div >
                            <div class="flex items-center group/entry">
                              <h4 class="text-sm font-medium text-gray-900 group-hover:text-primary">
                                {{ entry.name }}
                              </h4>
                              <span
                                class="material-icons text-base text-gray-400 transition-all duration-200  group-hover:ml-2 group-hover:text-amber-600 group-hover:text-primary group-hover/entry:translate-x-1"
                                style="display: inline-block; transform: translateX(0);"
                              >
                                chevron_right
                              </span>
                            </div>
                            <p class="mt-1 text-xs text-gray-500">{{ entry.description }}</p>
                          </div>
                        </a>
                      </div>
                    </div>
                  </ng-container>
                </div>
              </div>
            </div>
          </div>
        </ng-container>
      </nav>
    </div>

    <!-- Right Section: Language and CTA -->
    <div class="flex items-center">
      <!-- Language Selector -->
      <button class="text-sm h-9 px-3 flex items-center gap-1 hover:bg-gray-100 rounded-md">
        🌐 EN
      </button>

      <!-- CTA -->
      <a routerLink="/contact"
        class="ml-4 bg-amber-600 text-white h-10 px-4 py-2 rounded-lg hover:bg-blue-700 transition-all shadow-md">
        Contact Us
      </a>

      <!-- Mobile Controls -->
      <div class="lg:hidden flex items-center ml-4">
        <button (click)="toggleMenu()" class="h-10 p-2 flex items-center justify-center">
          <span class="material-icons text-2xl" *ngIf="!isOpen">menu</span>
          <span class="material-icons text-2xl" *ngIf="isOpen">close</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div *ngIf="isOpen" class="lg:hidden fixed inset-0 z-50 bg-white overflow-y-auto">
    <div class="flex justify-between items-center p-4 border-b border-gray-100">
      <a routerLink="/" class="relative z-10">
        <img src="logo.png" alt="DigiPOS Logo" class="h-10 w-auto" />
      </a>
      <button (click)="closeMenu()" class="h-10 w-10 flex items-center justify-center">
        <span class="material-icons text-2xl">close</span>
      </button>
    </div>
    <div class="p-4 space-y-4">
      <ng-container *ngFor="let item of navItems">
        <div class="border-b border-gray-100 pb-4">
          <button *ngIf="item.hasDropdown"
            (click)="activeDropdown === item.name ? activeDropdown = null : activeDropdown = item.name"
            class="w-full text-left text-lg font-medium flex justify-between">
            {{ item.name }}
            <span class="material-icons text-sm"
              [ngClass]="{ 'rotate-180': activeDropdown === item.name }">expand_more</span>
          </button>
          <a *ngIf="!item.hasDropdown" [routerLink]="item.href" (click)="closeMenu()"
            class="block py-2 text-lg font-medium hover:text-amber-600">
            {{ item.name }}
          </a>

          <!-- Mobile Dropdown Content -->
          <div *ngIf="activeDropdown === item.name" class="pl-4 mt-2 space-y-6">
            <ng-container *ngFor="let section of getDropdownContent(item.name)">
              <div>
                <h3 class="text-xs font-semibold text-gray-500 tracking-wider">{{ section.title }}</h3>
                <div class="mt-2 space-y-3">
                  <a *ngFor="let subItem of section.items" [routerLink]="subItem.href" (click)="closeMenu()"
                    class="flex items-center space-x-2 py-1 text-gray-700 hover:text-primary">
                    <div class="w-6 h-6 flex items-center justify-center text-primary">
                      <span class="material-icons text-base text-amber-600">{{ subItem.icon }}</span>
                    </div>
                    <span>{{ subItem.name }}</span>
                    <span class="material-icons text-base text-amber-600 ml-1 group-hover:text-amber-600 transition-all duration-200">
                      chevron_right
                    </span>
                  </a>
                </div>
              </div>
            </ng-container>
          </div>
        </div>
      </ng-container>

    </div>
  </div>
</header>
