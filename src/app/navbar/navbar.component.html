<nav class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
  <div class="mx-auto md:px-4">
    <div class="flex justify-evenly">
      <div class="flex items-center">
        <!-- Logo -->
        <a routerLink="/" class=" ">
          <img src="logo.png" alt="" class="h-24 md:h-32 w-auto">
        </a>

        <!-- Mobile menu button -->

        <div class="hidden sm:ml-10 sm:flex">
          <div class="relative">
            <div class="flex items-center space-x-1 md:space-x-3">
              <!-- Menu Items -->
              <div class="relative menu-container" *ngFor="let menuKey of menuKeys">
                <button class="flex items-center px-3 py-2 text-sm font-medium transition-colors"
                  [class.text-indigo-700]="activeMenu === menuKey" [class.text-gray-700]="activeMenu !== menuKey"
                  [class.hover:text-indigo-700]="activeMenu !== menuKey" (mouseenter)="openMenu(menuKey)"
                  (mouseleave)="startCloseMenu()">
                  {{ megaMenus[menuKey].title }}
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-chevron-down ml-1 h-4 w-4 transition-transform"
                    [class.rotate-180]="activeMenu === menuKey">
                    <path d="m6 9 6 6 6-6"></path>
                  </svg>
                </button>
              </div>

              <!-- Static Links -->
              <a class="hidden md:block px-3 py-2 text-sm font-medium text-gray-700 hover:text-indigo-700"
                routerLink="/partner">Become a Partner</a>
              <a class="hidden md:block px-3 py-2 text-sm font-medium text-gray-700 hover:text-indigo-700"
                routerLink="/pricing">Pricing</a>
            </div>
          </div>
        </div>
      </div>

      <!-- Right side - Language and CTA -->
      <div class="flex items-center gap-4">
        <a href="#"
          class="bg-blue-900 text-orange-400 text-sm md:text-base font-semibold py-2 px-4 rounded-full hover:bg-blue-800">
          Get a Demo
        </a>
        <a href="#" class="flex items-center text-sm font-medium">
          العربية
          <img src="https://flagcdn.com/w40/sa.png" alt="SA Flag" class="ml-1 w-5 h-4" />
        </a>
        <div class="sm:hidden ml-2">
          <button
            class="flex items-center justify-center p-2 rounded-md text-gray-700 hover:text-indigo-700 focus:outline-none"
            (click)="toggleMobileMenu()">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-6 w-6">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Mega Menu - Positioned outside of menu items to be full width from left edge -->
    <div *ngIf="activeMenu"
      class="absolute left-0 w-screen px-12 mt-0 bg-white border border-gray-200 rounded-lg rounded-t-none shadow-xl z-50 dropdown-menu"
      style=" opacity: 1; transform: none;" (mouseenter)="openMenu(activeMenu)"
      (mouseleave)="startCloseMenu()">
      <div class="container mx-auto">
        <div class="grid grid-cols-3 gap-4 p-4">
          <div *ngFor="let section of megaMenus[activeMenu].sections">
            <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">{{ section.title }}</h3>
            <ul class="space-y-3">
              <li *ngFor="let item of section.items">
                <a class="group flex items-start" [routerLink]="item.link">
                  <div class="flex-shrink-0 mt-1">
                    <!-- Material Icons from navbar.component.ts -->
                    <span class="material-icons text-orange-500" style="font-size: 20px;">
                      {{ item.icon }}
                    </span>
                  </div>
                  <div class="ml-3">
                    <div class="flex items-center">
                      <p class="text-sm font-medium text-gray-900 group-hover:text-indigo-700">{{ item.name }}</p>
                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="lucide lucide-chevron-down ml-1 h-3 w-3 text-gray-500 rotate-270">
                        <path d="m6 9 6 6 6-6"></path>
                      </svg>
                    </div>
                    <p class="mt-1 text-xs text-gray-500">{{ item.description }}</p>
                  </div>
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <!-- Mobile Menu (Hidden by default) -->
    <div *ngIf="mobileMenuOpen" class="sm:hidden">
      <div class="pt-2 pb-4 space-y-1">
        <div *ngFor="let menuKey of menuKeys">
          <button class="w-full flex items-center px-3 py-2 text-sm font-medium transition-colors border-l-4"
            [class.border-indigo-700]="activeMenu === menuKey" [class.border-transparent]="activeMenu !== menuKey"
            [class.text-indigo-700]="activeMenu === menuKey" [class.text-gray-700]="activeMenu !== menuKey"
            (click)="toggleMenu(menuKey)">
            {{ megaMenus[menuKey].title }}
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-chevron-down ml-1 h-4 w-4 transition-transform"
              [class.rotate-180]="activeMenu === menuKey">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </button>

          <!-- Mobile Mega Menu Content -->
          <div *ngIf="activeMenu === menuKey" class="bg-gray-50 px-4 py-2">
            <div *ngFor="let section of megaMenus[activeMenu].sections" class="mb-4">
              <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">{{ section.title }}</h3>
              <ul class="space-y-2">
                <li *ngFor="let item of section.items">
                  <a class="group flex items-start py-1" [routerLink]="item.link">
                    <div class="flex-shrink-0 w-32">
                      <!-- Update mobile menu icons to use Material Icons -->
                      <span class="material-icons text-orange-500" style="font-size: 20px;">
                        {{ item.icon }}
                      </span>
                    </div>
                    <div class="ml-3">
                      <p class="text-sm font-medium text-gray-900">{{ item.name }}</p>
                    </div>
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </div>

        <!-- Mobile Static Links -->
        <a class="block px-3 py-2 text-sm font-medium text-gray-700 hover:text-indigo-700 border-l-4 border-transparent"
          routerLink="/partner">Become a Partner</a>
        <a class="block px-3 py-2 text-sm font-medium text-gray-700 hover:text-indigo-700 border-l-4 border-transparent"
          routerLink="/pricing">Pricing</a>
      </div>
    </div>
  </div>
</nav>
